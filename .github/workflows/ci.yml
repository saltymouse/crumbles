name: ci

on:
  push:
  pull_request:

jobs:
  firefox:
    name: build & lint (Firefox)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      # Builds dist/firefox, then runs addons-linter (the same engine AMO uses).
      # Fails on validation errors; warnings are reported but do not fail the build.
      - run: bun run check:firefox
